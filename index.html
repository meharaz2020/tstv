<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>MHR TV | PREMIUM</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow: hidden;
        }
        /* Home Grid */
        
        #home {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 15px;
            width: 85%;
            max-width: 500px;
        }
        
        .channel-card {
            background: #111;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid #222;
        }
        
        .channel-card:focus {
            transform: scale(1.1);
            border-color: red;
            outline: none;
            background: #222;
        }
        
        .channel-card img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }
        /* Player Layer */
        
        #player-layer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
        }
        
        video {
            width: 100%;
            height: 100%;
        }
        /* CHANNEL NAME OVERLAY (Top) */
        
        #channel-info {
            position: fixed;
            top: 40px;
            left: 40px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 5px;
            border-left: 5px solid red;
            font-size: 24px;
            font-weight: bold;
            display: none;
            z-index: 2000;
        }
        /* TV VOLUME UI (Bottom Center) */
        
        #vol-ui {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.9);
            padding: 15px 40px;
            border-radius: 15px;
            display: none;
            align-items: center;
            gap: 20px;
            z-index: 2000;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }
        
        .vol-icon {
            color: #aaa;
        }
        
        .vol-track {
            width: 300px;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
        }
        
        #vol-fill {
            height: 100%;
            background: red;
            width: 100%;
            transition: width 0.1s ease;
        }
        
        #vol-number {
            font-size: 28px;
            font-weight: 900;
            color: white;
            min-width: 60px;
            text-align: right;
        }
        /* List Icon (Bottom Left) */
        
        #list-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 2000;
            cursor: pointer;
            opacity: 0.5;
        }
        
        #list-btn:hover {
            opacity: 1;
            color: red;
        }
    </style>
</head>

<body>

    <div id="home">
        <h2 style="color:red; letter-spacing:4px;">MHR TV</h2>
        <div id="grid" class="channel-grid"></div>
    </div>

    <div id="player-layer">
        <div id="channel-info"></div>

        <div id="vol-ui">
            <span class="material-icons vol-icon">volume_up</span>
            <div class="vol-track">
                <div id="vol-fill"></div>
            </div>
            <div id="vol-number">100</div>
        </div>

        <div id="list-btn" onclick="location.reload()">
            <span class="material-icons" style="font-size:40px;">apps</span>
        </div>

        <video id="tv-video" playsinline></video>
    </div>

    <script>
        // CHANNEL DATABASE
        const channels = [{
            name: "T SPORTS",
            logo: "https://upload.wikimedia.org/wikipedia/en/thumb/3/37/T_Sports_logo.png/320px-T_Sports_logo.png",
            url: "https://tvsen6.aynascope.net/SportsGrid/index.m3u8?e=1772558062&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=14d6905df8730b0468f1eaa917857125"
        }, {
            name: "WILLOW HD",
            logo: "https://upload.wikimedia.org/wikipedia/en/thumb/5/5b/Willow_TV_Logo.png/250px-Willow_TV_Logo.png",
            url: "https://tvsen5.aynascope.net/willowhd/index.m3u8?e=1772558068&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=7c21a6489d45e2b06522197c28e8d5a3"
        }];

        let currentIndex = 0;
        const video = document.getElementById('tv-video');
        const playerLayer = document.getElementById('player-layer');
        const chInfo = document.getElementById('channel-info');
        const volUI = document.getElementById('vol-ui');
        const volFill = document.getElementById('vol-fill');
        const volNum = document.getElementById('vol-number');
        let hls = new Hls();

        // Setup Home Grid
        const grid = document.getElementById('grid');
        channels.forEach((ch, idx) => {
            const div = document.createElement('div');
            div.className = 'channel-card';
            div.tabIndex = 0;
            div.innerHTML = `<img src="${ch.logo}"><p>${ch.name}</p>`;
            div.onclick = () => startStream(idx);
            grid.appendChild(div);
        });

        function startStream(idx) {
            currentIndex = idx;
            const ch = channels[idx];
            playerLayer.style.display = 'block';
            if (playerLayer.requestFullscreen) playerLayer.requestFullscreen();

            // Show Channel Info (Name)
            chInfo.innerText = ch.name;
            chInfo.style.display = 'block';
            setTimeout(() => chInfo.style.display = 'none', 4000);

            if (Hls.isSupported()) {
                hls.detachMedia();
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = ch.url;
                video.play();
            }
        }

        // Remote Keys
        window.addEventListener('keydown', (e) => {
            if (playerLayer.style.display === 'block') {
                // Volume Up/Down
                if (e.key === "ArrowUp") {
                    video.volume = Math.min(1, video.volume + 0.02);
                    showVol();
                } else if (e.key === "ArrowDown") {
                    video.volume = Math.max(0, video.volume - 0.02);
                    showVol();
                }
                // Channel Swap Left/Right
                else if (e.key === "ArrowRight") {
                    currentIndex = (currentIndex + 1) % channels.length;
                    startStream(currentIndex);
                } else if (e.key === "ArrowLeft") {
                    currentIndex = (currentIndex - 1 + channels.length) % channels.length;
                    startStream(currentIndex);
                }
                // Back
                else if (e.key === "Escape" || e.key === "Backspace") {
                    playerLayer.style.display = 'none';
                    video.pause();
                    document.exitFullscreen();
                }
            }
        });

        function showVol() {
            let level = Math.round(video.volume * 100);
            volNum.innerText = level;
            volFill.style.width = level + "%";
            volUI.style.display = 'flex';
            clearTimeout(window.vTimer);
            window.vTimer = setTimeout(() => volUI.style.display = 'none', 2500);
        }
    </script>

</body>

</html>
