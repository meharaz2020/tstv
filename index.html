<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>MHR TV | PRO</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
         :root {
            --accent: #ff0000;
        }
        
        body {
            margin: 0;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }
        /* HEADER */
        
        header {
            text-align: center;
            padding: 10px;
            background: #111;
            border-bottom: 2px solid var(--accent);
        }
        
        h2 {
            margin: 0;
            color: var(--accent);
            font-size: 1.2rem;
        }
        /* MAIN CONTAINER */
        
        #main-container {
            display: flex;
            height: calc(100vh - 50px);
        }
        /* LEFT SIDE: 100 CHANNEL LIST */
        
        #sidebar {
            width: 250px;
            background: #0a0a0a;
            overflow-y: auto;
            border-right: 1px solid #222;
            padding: 10px;
            scrollbar-width: thin;
        }
        
        .channel-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 8px;
            background: #151515;
            cursor: pointer;
            border: 2px solid transparent;
            outline: none;
            transition: 0.2s;
        }
        
        .channel-item:focus,
        .channel-item.active {
            background: #222;
            border-color: var(--accent);
            transform: scale(1.03);
        }
        
        .channel-item img {
            width: 35px;
            height: 35px;
            object-fit: contain;
        }
        
        .channel-item p {
            margin: 0;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
        }
        /* RIGHT SIDE: THE PLAYER */
        
        #player-area {
            flex-grow: 1;
            background: #000;
            position: relative;
        }
        /* THE MAGIC WINDOW */
        
        #tv-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }
        
        #welcome-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #444;
        }
    </style>
</head>

<body>

    <header>
        <h2>MHR TV PREMIUM</h2>
    </header>

    <div id="main-container">
        <div id="sidebar" id="grid"></div>

        <div id="player-area">
            <div id="welcome-msg">
                <span class="material-icons" style="font-size: 50px;">play_circle</span>
                <p>Select a channel to start</p>
            </div>
            <iframe id="tv-frame" name="player" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const channels = [{
                name: "T SPORTS",
                logo: "https://s3.aynaott.com/storage/dbc585f70a60b9855b6e13a8ce4cb6f4",
                url: "http://103.144.89.251:8082/T-SPORTS-HD/index.m3u8?token=094380b1d1fc232cf14ae05deadbb2b329b39f81-fe927dc24e7292c760ec087589843bf9-1772569334-1772558534&remote=no_check_ip"
            }, {
                name: "WILLOW HD",
                logo: "https://s3.aynaott.com/storage/94a778ec3219f7eb54bdf1ee07a95788",
                url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1723/output/index.m3u8"
            }
            // Add all 100 here
        ];

        const sidebar = document.getElementById('sidebar');
        const frame = document.getElementById('tv-frame');
        const welcome = document.getElementById('welcome-msg');
        let currentIndex = 0;

        channels.forEach((ch, idx) => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.tabIndex = 0;
            div.innerHTML = `<img src="${ch.logo}"><p>${ch.name}</p>`;

            const loadChannel = () => {
                currentIndex = idx;
                welcome.style.display = 'none';
                frame.src = ch.url; // Loads link in the SAME frame

                // Remove active class from others
                document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
            };

            div.onclick = loadChannel;
            div.onkeydown = (e) => {
                if (e.key === "Enter") loadChannel();
            };
            sidebar.appendChild(div);
        });

        // REMOTE NAVIGATION
        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowDown") {
                currentIndex = (currentIndex + 1) % channels.length;
                sidebar.children[currentIndex].focus();
            } else if (e.key === "ArrowUp") {
                currentIndex = (currentIndex - 1 + channels.length) % channels.length;
                sidebar.children[currentIndex].focus();
            }
        });

        window.onload = () => {
            if (sidebar.children[0]) sidebar.children[0].focus();
        };
    </script>
</body>

</html>
