<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Sports Live Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* Shared Styles */
        body, html { margin: 0; padding: 0; background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; height: 100%; }

        /* LIST MODE STYLES */
        #list-view { padding: 40px 20px; text-align: center; }
        .logo-main { width: 140px; margin-bottom: 20px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 20px; max-width: 1100px; margin: 0 auto; 
        }
        .card { 
            background: #161616; padding: 20px; border-radius: 15px; 
            cursor: pointer; border: 1px solid #333; transition: 0.3s;
        }
        .card:hover { border-color: #ff0000; transform: translateY(-5px); background: #1f1f1f; }
        .card img { width: 50px; margin-bottom: 10px; }
        
        /* PLAYER MODE STYLES */
        #player-view { display: none; width: 100%; height: 100%; background: black; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .controls { position: absolute; top: 15px; left: 15px; z-index: 10; display: flex; gap: 10px; }
        button.btn { background: rgba(255, 0, 0, 0.8); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="list-view">
        <img src="http://103.144.89.251/assets/images/T%20SPORTS1744972630.png" class="logo-main">
        <h1 style="color: #ff0000; margin-bottom: 40px;">LIVE TV CHANNELS</h1>
        <div class="grid" id="grid"></div>
    </div>

    <div id="player-view">
        <div class="controls">
            <button class="btn" onclick="document.documentElement.requestFullscreen()">Full Screen</button>
            <button class="btn" onclick="window.close()" style="background: #444;">Close Window</button>
        </div>
        <video id="video" controls autoplay playsinline></video>
    </div>

    <script>
        // List your channels here
        const channels = [
            { name: "T-Sports HD", url: "http://103.144.89.251:8082/T-SPORTS-HD/index.m3u8?token=f1446324f8f95119b94aa404cc163b8838b03c23-49aef64b56d14eff1cfdfe5f7a61eea3-1772657183-1772646383&remote=no_check_ip" },
            { name: "Channel 2", url: "http://example.com/stream2.m3u8" },
            // ... add up to 50 channels
        ];

        // Logic to determine if this is the "Main List" or "Popup Player"
        const urlParams = new URLSearchParams(window.location.search);
        const streamUrl = urlParams.get('play');

        if (streamUrl) {
            // --- PLAYER MODE ---
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'block';
            document.title = "Streaming...";

            const video = document.getElementById('video');
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
            }

            // Sound Shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === "ArrowUp") video.volume = Math.min(video.volume + 0.1, 1);
                if (e.key === "ArrowDown") video.volume = Math.max(video.volume - 0.1, 0);
            });

        } else {
            // --- LIST MODE ---
            const grid = document.getElementById('grid');
            channels.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="http://103.144.89.251/assets/images/T%20SPORTS1744972630.png">
                    <span>${ch.name}</span>
                `;
                card.onclick = () => {
                    const w = 1280;
                    const h = 720;
                    const left = (screen.width/2)-(w/2);
                    const top = (screen.height/2)-(h/2);
                    
                    // Opens the SAME page but with the ?play= parameter
                    const popupUrl = window.location.origin + window.location.pathname + "?play=" + encodeURIComponent(ch.url);
                    window.open(popupUrl, '_blank', `width=${w},height=${h},top=${top},left=${left},menubar=no,status=no,toolbar=no,location=no`);
                };
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
