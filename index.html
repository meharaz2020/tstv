<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHR PRO - Portal</title>
    <style>
        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        
        .logo {
            font-size: 2.5rem;
            letter-spacing: 8px;
            font-weight: 900;
            margin-bottom: 40px;
            color: #fff;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 600px;
        }
        
        .ch-card {
            background: #151515;
            padding: 40px 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.3s;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .ch-card:hover {
            background: #fff;
            color: #000;
            transform: translateY(-5px);
        }
        
        .ch-card span {
            display: block;
            font-size: 0.7rem;
            margin-top: 10px;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <div class="logo">MHR PRO</div>

    <div class="grid">
        <div class="ch-card" onclick="openFullStream(0)">
            Star Jalsha
            <span>OPEN IN NEW TAB</span>
        </div>
        <div class="ch-card" onclick="openFullStream(1)">
            Zee Bangla
            <span>OPEN IN NEW TAB</span>
        </div>
    </div>

    <script>
        const playlist = [
            "http://103.144.89.251:8082/STAR.JALSHA.HD/index.m3u8?token=abc278d302818591790a0ba51520c86ef023a65c-7f92310241b96c363b9933b1881e1212-1772831839-1772821039&remote=no_check_ip",
            "http://103.144.89.251:8082/ZEE.BANGLA.HD/index.m3u8?token=f04bc2eeda8b5cfae097b10e01ff12ad15bdf95c-c28c41c9030e870ed722d56850bfbfc9-1772831917-1772821117&remote=no_check_ip"
        ];

        function openFullStream(index) {
            const m3u8Url = playlist[index];

            /* Since Vercel is HTTPS and your link is HTTP, we use an 
               external web player that allows HTTP links. 
            */
            const playerWrapper = m3u8Url;

            // Open the external player with your link in a new tab
            window.open(playerWrapper, '_blank');
        }
    </script>
</body>

</html>
