<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Sports Live Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --red: #ff0000; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }

        /* Grid Setup */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 15px; max-width: 1100px; margin: 20px auto; 
        }
        .card { 
            background: var(--card); padding: 20px; border-radius: 12px; 
            cursor: pointer; border: 1px solid #333; transition: 0.3s;
        }
        .card:hover { border-color: var(--red); transform: translateY(-5px); }
        .card img { width: 50px; margin-bottom: 10px; }

        /* THE FLOATING POPUP (MODAL) */
        #video-popup {
            display: none; /* Hidden by default */
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: #000;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            border: 2px solid #333;
            border-radius: 15px;
            z-index: 1000;
        }
        
        /* The header inside the popup */
        .popup-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; background: #111; border-bottom: 1px solid #333;
            border-radius: 15px 15px 0 0;
        }

        .close-btn {
            background: var(--red); color: white; border: none;
            padding: 5px 12px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        /* Dark overlay to focus on the popup */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 999;
        }

        video { width: 100%; height: calc(100% - 45px); border-radius: 0 0 15px 15px; outline: none; }
    </style>
</head>
<body>

    <img src="http://103.144.89.251/assets/images/T%20SPORTS1744972630.png" width="120">
    <h1 style="color:var(--red)">CHANNEL CONSOLE</h1>

    <div class="grid" id="grid"></div>

    <div id="overlay" onclick="closePopup()"></div>
    <div id="video-popup">
        <div class="popup-header">
            <span id="ch-title" style="font-weight:bold; font-size:14px; color:#aaa;">Loading...</span>
            <button class="close-btn" onclick="closePopup()">EXIT</button>
        </div>
        <video id="player" controls autoplay playsinline></video>
    </div>

    <script>
        const channels = [
            { name: "T-Sports HD", url: "http://103.144.89.251:8082/T-SPORTS-HD/index.m3u8?token=f1446324f8f95119b94aa404cc163b8838b03c23-49aef64b56d14eff1cfdfe5f7a61eea3-1772657183-1772646383&remote=no_check_ip" },
            { name: "Channel 2", url: "http://example.com/stream2.m3u8" },
            { name: "Channel 3", url: "http://example.com/stream3.m3u8" },
            // Add all 50 channels here
        ];

        const grid = document.getElementById('grid');
        const popup = document.getElementById('video-popup');
        const overlay = document.getElementById('overlay');
        const player = document.getElementById('player');
        const chTitle = document.getElementById('ch-title');
        let hls = null;

        // Build the list
        channels.forEach((ch) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<img src="http://103.144.89.251/assets/images/T%20SPORTS1744972630.png"><br><small>${ch.name}</small>`;
            div.onclick = () => openChannel(ch.url, ch.name);
            grid.appendChild(div);
        });

        function openChannel(url, name) {
            // Show the popup and overlay
            popup.style.display = 'block';
            overlay.style.display = 'block';
            chTitle.innerText = "STREAMING: " + name;

            // Kill existing stream before starting new one
            if (hls) { hls.destroy(); }

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                player.src = url;
            }
        }

        function closePopup() {
            popup.style.display = 'none';
            overlay.style.display = 'none';
            player.pause();
            player.src = "";
            if (hls) { hls.destroy(); hls = null; }
        }
    </script>
</body>
</html>
