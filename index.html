<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Sports Live Console</title>
    <style>
        :root { --red: #ff0000; --dark: #0a0a0a; --card: #161616; }
        body { 
            background: var(--dark); color: white; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; padding: 40px; margin: 0; 
        }
        
        .logo-box { margin-bottom: 20px; }
        h1 { color: var(--red); font-size: 2.2rem; margin: 0; letter-spacing: 1px; }
        p { color: #666; margin-top: 10px; margin-bottom: 40px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; max-width: 1200px; margin: 0 auto; 
        }

        .channel-card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 20px; 
            cursor: pointer; 
            border: 1px solid #333; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .channel-card:hover { 
            border-color: var(--red); 
            transform: scale(1.05);
            background: #1f1f1f; 
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
        }

        .ch-id { 
            position: absolute; top: 12px; left: 15px; 
            color: var(--red); font-weight: bold; font-size: 1rem; opacity: 0.6;
        }

        .channel-card img { width: 60px; margin-bottom: 15px; }
        .channel-card span { display: block; font-weight: 600; color: #fff; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="logo-box">
        <img src="http://103.144.89.251/assets/images/T%20SPORTS1744972630.png" width="140">
    </div>
    <h1>LIVE CHANNELS</h1>
    <p>Click to launch the player in a full-screen popup window</p>

    <div class="grid" id="grid"></div>

    <script>
        const channels = [
            { 
                name: "T-Sports HD", 
                url: "http://103.144.89.251:8082/T-SPORTS-HD/index.m3u8?token=f1446324f8f95119b94aa404cc163b8838b03c23-49aef64b56d14eff1cfdfe5f7a61eea3-1772657183-1772646383&remote=no_check_ip" 
            },
            { name: "Channel 2", url: "http://example.com/2.m3u8" },
            { name: "Channel 3", url: "http://example.com/3.m3u8" },
            // Add all 50 channels here...
        ];

        const grid = document.getElementById('grid');

        channels.forEach((ch, i) => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `
                <span class="ch-id">${i + 1}</span>
                <img src="http://103.144.89.251/assets/images/T%20SPORTS1744972630.png">
                <span>${ch.name}</span>
            `;
            card.onclick = () => launchFullScreenPopup(ch.url);
            grid.appendChild(card);
        });

        function launchFullScreenPopup(url) {
            // Get user's full screen size
            const w = window.screen.availWidth;
            const h = window.screen.availHeight;
            
            // Set window features to hide browser UI
            const features = [
                `width=${w}`,
                `height=${h}`,
                `top=0`,
                `left=0`,
                'menubar=no',
                'toolbar=no',
                'location=yes', // Shows the direct stream URL
                'status=no',
                'resizable=yes',
                'scrollbars=no'
            ].join(',');

            // Launch popup
            const popup = window.open(url, '_blank', features);
            
            if (popup) {
                popup.focus();
            } else {
                alert("Please allow popups for this site to watch the stream.");
            }
        }

        // Keyboard Numbers 1-9 support
        document.addEventListener('keydown', (e) => {
            const key = parseInt(e.key);
            if (key > 0 && key <= channels.length) {
                launchFullScreenPopup(channels[key - 1].url);
            }
        });
    </script>
</body>
</html>
