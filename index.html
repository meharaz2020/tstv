<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>MHR TV | PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        :root { --accent: #ff0000; }
        body { margin: 0; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }

        /* FRONT PAGE GRID */
        #home { display: flex; flex-direction: column; align-items: center; height: 100vh; padding-top: 15px; }
        
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 12px; width: 95%; max-height: 85vh;
            overflow-y: auto; padding: 15px;
            scrollbar-width: none;
        }
        .channel-grid::-webkit-scrollbar { display: none; }

        .channel-card {
            background: #111; padding: 10px; border-radius: 10px;
            text-align: center; cursor: pointer; border: 2px solid #222; outline: none;
            transition: 0.2s;
        }

        /* Remote Selection Highlight */
        .channel-card:focus {
            transform: scale(1.1);
            border-color: var(--accent);
            background: #222;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        .channel-card img { width: 40px; height: 40px; object-fit: contain; pointer-events: none; }
        .channel-card p { margin: 5px 0 0 0; font-size: 9px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PLAYER */
        #player-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        video { width: 100%; height: 100%; background: #000; }

        /* TV VOLUME UI (Bottom Center) */
        #vol-ui {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.95); padding: 12px 30px; border-radius: 12px;
            display: none; align-items: center; gap: 20px; z-index: 2000; border: 1px solid #333;
        }
        .vol-track { width: 250px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        #vol-fill { height: 100%; background: var(--accent); width: 100%; }
        #vol-number { font-size: 24px; font-weight: bold; min-width: 50px; text-align: right; }

        #ch-title {
            position: fixed; top: 30px; left: 30px; background: rgba(0,0,0,0.7);
            padding: 8px 15px; border-radius: 5px; border-left: 4px solid var(--accent);
            font-size: 20px; font-weight: bold; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="home">
        <h3 style="color:var(--accent); letter-spacing:3px; margin: 0 0 10px 0;">MHR TV PRO</h3>
        <div id="grid" class="channel-grid"></div>
    </div>

    <div id="player-layer">
        <div id="ch-title"></div>
        <div id="vol-ui">
            <span class="material-icons">volume_up</span>
            <div class="vol-track"><div id="vol-fill"></div></div>
            <div id="vol-number">100</div>
        </div>
        <video id="tv-video" playsinline></video>
    </div>

    <script>
        // Update this list with your 100 channels
        const channels = [
            { 
                name: "T SPORTS", 
                logo: "https://s3.aynaott.com/storage/dbc585f70a60b9855b6e13a8ce4cb6f4", 
                url: "http://103.144.89.251:8082/T-SPORTS-HD/index.m3u8?token=094380b1d1fc232cf14ae05deadbb2b329b39f81-fe927dc24e7292c760ec087589843bf9-1772569334-1772558534&remote=no_check_ip" 
            },
            { 
                name: "WILLOW HD", 
                logo: "https://s3.aynaott.com/storage/94a778ec3219f7eb54bdf1ee07a95788", 
                url: "https://tvsen5.aynascope.net/willowhd/index.m3u8?e=1772558068&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=7c21a6489d45e2b06522197c28e8d5a3" 
            }
        ];

        let currentIndex = 0;
        const video = document.getElementById('tv-video');
        const playerLayer = document.getElementById('player-layer');
        const hls = new Hls();

        // 1. Build Grid
        const grid = document.getElementById('grid');
        channels.forEach((ch, idx) => {
            const div = document.createElement('div');
            div.className = 'channel-card';
            div.tabIndex = 0; // Allows Remote Focus
            div.innerHTML = `<img src="${ch.logo}"><p>${ch.name}</p>`;
            div.onclick = () => startStream(idx);
            div.onkeydown = (e) => { if(e.key === "Enter") startStream(idx); };
            grid.appendChild(div);
        });

        // Auto-focus first channel for TV remote
        window.onload = () => { if(grid.children[0]) grid.children[0].focus(); };

        function startStream(idx) {
            currentIndex = idx;
            const ch = channels[idx];
            playerLayer.style.display = 'block';
            
            // Channel Name Overlay
            const title = document.getElementById('ch-title');
            title.innerText = ch.name;
            title.style.display = 'block';
            setTimeout(() => title.style.display = 'none', 3000);

            if (Hls.isSupported()) {
                hls.detachMedia();
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = ch.url;
                video.play();
            }
        }

        // 2. REMOTE KEY NAVIGATION (Inside Player)
        window.addEventListener('keydown', (e) => {
            if (playerLayer.style.display === 'block') {
                // Volume Controls
                if (e.key === "ArrowUp") { video.volume = Math.min(1, video.volume + 0.05); showVol(); }
                if (e.key === "ArrowDown") { video.volume = Math.max(0, video.volume - 0.05); showVol(); }
                
                // Channel Surfing (Left/Right)
                if (e.key === "ArrowRight") startStream((currentIndex + 1) % channels.length);
                if (e.key === "ArrowLeft") startStream((currentIndex - 1 + channels.length) % channels.length);
                
                // Exit Player (Back/Esc)
                if (e.key === "Escape" || e.key === "Backspace") {
                    playerLayer.style.display = 'none';
                    video.pause();
                    hls.detachMedia();
                    grid.children[currentIndex].focus();
                }
            }
        });

        function showVol() {
            const level = Math.round(video.volume * 100);
            document.getElementById('vol-fill').style.width = level + "%";
            document.getElementById('vol-number').innerText = level;
            document.getElementById('vol-ui').style.display = 'flex';
            clearTimeout(window.vT);
            window.vT = setTimeout(() => document.getElementById('vol-ui').style.display = 'none', 2000);
        }
    </script>
</body>
</html>
