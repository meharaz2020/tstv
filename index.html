<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Sports Multi-Channel</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #ff0000; --bg: #0a0a0a; --sidebar: #151515; }
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Style */
        .sidebar { width: 320px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #333; }
        .sidebar-header { padding: 20px; text-align: center; background: #000; }
        .sidebar-header img { width: 120px; }
        
        .channel-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .channel-item {
            display: flex; align-items: center; padding: 12px; margin-bottom: 5px;
            background: #222; border-radius: 5px; cursor: pointer; transition: 0.2s;
        }
        .channel-item:hover { background: #333; }
        .channel-item.active { background: var(--primary); }
        .channel-item img { width: 30px; margin-right: 15px; }

        /* Player Area */
        .main-player { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #video-wrapper { flex-grow: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Back to List (Mobile Only) */
        .mobile-header { display: none; padding: 10px; background: #000; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 40%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="http://103.144.89.251/assets/images/T%20SPORTS1744972630.png" alt="Logo">
            <p>50 Live Channels</p>
        </div>
        <div class="channel-list" id="channelList">
            </div>
    </div>

    <div class="main-player">
        <div id="video-wrapper">
            <video id="video" controls autoplay playsinline></video>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const channelList = document.getElementById('channelList');
        let hls = null;

        // Add your 50 channels here
        const channels = [
            { name: "T-Sports HD", url: "http://103.144.89.251:8082/T-SPORTS-HD/index.m3u8?token=f1446324f8f95119b94aa404cc163b8838b03c23-49aef64b56d14eff1cfdfe5f7a61eea3-1772657183-1772646383&remote=no_check_ip" },
            { name: "Sports Channel 2", url: "HTTP_LINK_HERE" },
            { name: "Sports Channel 3", url: "HTTP_LINK_HERE" },
            // ... add more up to 50
        ];

        function loadChannel(url, element) {
            // Highlight active channel
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            // Initialize Player
            if (hls) { hls.destroy(); }
            
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }

        // Build the list
        channels.forEach(ch => {
            const item = document.createElement('div');
            item.className = 'channel-item';
            item.innerHTML = `<img src="http://103.144.89.251/assets/images/T%20SPORTS1744972630.png"> <span>${ch.name}</span>`;
            item.onclick = () => loadChannel(ch.url, item);
            channelList.appendChild(item);
        });

        // Volume keys
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowUp") video.volume = Math.min(video.volume + 0.1, 1);
            if (e.key === "ArrowDown") video.volume = Math.max(video.volume - 0.1, 0);
        });
    </script>
</body>
</html>
