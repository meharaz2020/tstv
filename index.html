<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Sports Live Portal</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 30px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 10px; cursor: pointer; border: 1px solid #333; }
        .card:hover { border-color: red; background: #222; }
        .card img { width: 60px; }
        h1 { color: red; }
    </style>
</head>
<body>

    <img src="http://103.144.89.251/assets/images/T%20SPORTS1744972630.png" width="150">
    <h1>CHOOSE A CHANNEL</h1>

    <div class="grid" id="grid"></div>

    <script>
        const channels = [
            { name: "T-Sports HD", url: "http://103.144.89.251:8082/T-SPORTS-HD/index.m3u8?token=f1446324f8f95119b94aa404cc163b8838b03c23-49aef64b56d14eff1cfdfe5f7a61eea3-1772657183-1772646383&remote=no_check_ip" },
            // Add more here
        ];

        const grid = document.getElementById('grid');

        channels.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<img src="http://103.144.89.251/assets/images/T%20SPORTS1744972630.png"><br><small>${ch.name}</small>`;
            div.onclick = () => playInSameTab(ch.url, ch.name);
            grid.appendChild(div);
        });

        function playInSameTab(url, name) {
            // We create a Full Screen player that replaces the current page content
            // This is the only way to keep it in the same tab on Vercel
            document.body.innerHTML = `
                <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999;">
                    <button onclick="location.reload()" style="position:absolute; top:10px; left:10px; z-index:10001; padding:10px; cursor:pointer;">← BACK TO LIST</button>
                    <video id="player" controls autoplay style="width:100%; height:100%;"></video>
                </div>
                <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"><\/script>
            `;

            // Load HLS after injecting the player
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/npm/hls.js@latest";
            script.onload = () => {
                const video = document.getElementById('player');
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else {
                    video.src = url;
                }
            };
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
