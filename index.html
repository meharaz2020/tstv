<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T Sports HD - TV Mode</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

video {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    background: black;
}
.channel-name {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    background: rgba(0,0,0,0.6);
    padding: 10px 15px;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="channel-name">T Sports HD</div>
<video id="video" autoplay controls></video>

<script>
var video = document.getElementById('video');
var stream = "http://103.144.89.251:8082/T-SPORTS-HD/index.m3u8?token=79601018981a65cd29ee2e20322481bdc898b3c3-1437b9d04b921ede14e95fd4c3ae7e25-1772540450-1772529650";

function loadStream() {
    if (Hls.isSupported()) {
        var hls = new Hls({
            maxBufferLength: 30
        });
        hls.loadSource(stream);
        hls.attachMedia(video);

        hls.on(Hls.Events.ERROR, function () {
            setTimeout(loadStream, 3000);
        });
    } 
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = stream;
    }
}

loadStream();
</script>

</body>
</html>
