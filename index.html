<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHR PRO - Live TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
         :root {
            --bg: #050505;
            --card: #121212;
            --text: #ffffff;
        }
        
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        /* Home Screen */
        
        #home {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        
        .logo {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 10px;
            margin-bottom: 40px;
            background: linear-gradient(45deg, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 80%;
            max-width: 600px;
        }
        
        .card {
            background: var(--card);
            padding: 50px 20px;
            border-radius: 20px;
            border: 1px solid #222;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        
        .card:hover {
            background: #fff;
            color: #000;
            transform: translateY(-5px);
        }
        /* Player Screen (Hidden by default) */
        
        #player-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
        }
        
        video {
            width: 100%;
            height: 100%;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            z-index: 110;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 14px;
            backdrop-filter: blur(10px);
        }
        
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            display: none;
        }
        
        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="home">
        <div class="logo">MHR PRO</div>
        <div class="grid">
            <div class="card" onclick="play(0)">STAR JALSHA</div>
            <div class="card" onclick="play(1)">ZEE BANGLA</div>
        </div>
    </div>

    <div id="player-container">
        <div class="back-btn" onclick="closePlayer()">← BACK TO LIST</div>
        <div id="loader"></div>
        <video id="video" controls autoplay playsinline></video>
    </div>

    <script>
        const playlist = [
            "http://103.144.89.251:8082/STAR.JALSHA.HD/index.m3u8?token=abc278d302818591790a0ba51520c86ef023a65c-7f92310241b96c363b9933b1881e1212-1772831839-1772821039&remote=no_check_ip",
            "http://103.144.89.251:8082/ZEE.BANGLA.HD/index.m3u8?token=f04bc2eeda8b5cfae097b10e01ff12ad15bdf95c-c28c41c9030e870ed722d56850bfbfc9-1772831917-1772821117&remote=no_check_ip"
        ];

        let hls = null;
        const video = document.getElementById('video');
        const loader = document.getElementById('loader');

        function play(id) {
            const url = playlist[id];
            document.getElementById('player-container').style.display = 'block';
            loader.style.display = 'block';

            if (hls) hls.destroy(); // Clear previous stream

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }

            video.onplaying = () => loader.style.display = 'none';
            video.onwaiting = () => loader.style.display = 'block';
            video.onerror = () => alert("Stream Error: Token might be expired.");
        }

        function closePlayer() {
            video.pause();
            if (hls) hls.destroy();
            document.getElementById('player-container').style.display = 'none';
        }
    </script>
</body>

</html>
