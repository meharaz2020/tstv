<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>MHR TV | PRO</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
         :root {
            --accent: #ff0000;
        }
        
        body {
            margin: 0;
            background: #050505;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }
        
        #home {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 15px;
            width: 95%;
            max-width: 800px;
            padding: 20px;
        }
        /* Channel Link Box */
        
        .channel-link {
            text-decoration: none;
            color: inherit;
            background: #111;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #222;
            outline: none;
            transition: 0.2s;
            display: block;
        }
        /* Remote Focus Highlight */
        
        .channel-link:focus {
            transform: scale(1.1);
            border-color: var(--accent);
            background: #222;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        
        .channel-link img {
            width: 45px;
            height: 45px;
            object-fit: contain;
        }
        
        .channel-link p {
            margin: 8px 0 0 0;
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        h2 {
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        
        .info {
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div id="home">
        <h2>MHR TV</h2>
        <p class="info">Select a channel to open in a new tab</p>
        <div id="grid" class="channel-grid"></div>
    </div>

    <script>
        // ADD YOUR 100 CHANNELS HERE
        const channels = [{
            name: "T SPORTS",
            logo: "https://s3.aynaott.com/storage/dbc585f70a60b9855b6e13a8ce4cb6f4",
            url: "http://103.144.89.251:8082/T-SPORTS-HD/index.m3u8?token=094380b1d1fc232cf14ae05deadbb2b329b39f81-fe927dc24e7292c760ec087589843bf9-1772569334-1772558534&remote=no_check_ip"
        }, {
            name: "WILLOW HD",
            logo: "https://s3.aynaott.com/storage/94a778ec3219f7eb54bdf1ee07a95788",
            url: "https://tvsen5.aynascope.net/willowhd/index.m3u8?e=1772558068&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=7c21a6489d45e2b06522197c28e8d5a3"
        }];

        const grid = document.getElementById('grid');

        channels.forEach((ch) => {
            // Create a clickable anchor tag
            const a = document.createElement('a');
            a.className = 'channel-link';
            a.href = ch.url;
            a.target = "_blank"; // This makes it open in a NEW TAB
            a.rel = "noreferrer"; // Adds extra security/privacy

            a.innerHTML = `
                <img src="${ch.logo}" alt="${ch.name}">
                <p>${ch.name}</p>
            `;

            grid.appendChild(a);
        });

        // Auto-focus first channel for TV remote users
        window.onload = () => {
            if (grid.children[0]) grid.children[0].focus();
        };
    </script>
</body>

</html>
