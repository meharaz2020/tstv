    <style>
         :root {
            --mhr-accent: #ffffff;
        }
        
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
            touch-action: none;
        }
        
        .tv-frame {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }
        /* FULL SCREEN FIX: Use 'fill' to stretch or 'cover' to crop-to-fill */
        
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: fill;
            /* This forces the video to take the full screen */
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .active-view {
            opacity: 1 !important;
        }
        
        #blackout {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 5;
            pointer-events: none;
            opacity: 1;
            transition: 0.3s;
        }
        /* UI Display */
        
        #chInfo {
            position: absolute;
            top: 40px;
            left: 40px;
            color: #fff;
            z-index: 10;
            opacity: 0;
            transition: 0.3s;
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.9);
        }
        
        #chNumber {
            font-size: 80px;
            font-weight: 100;
            line-height: 1;
        }
        
        #chInfo.show {
            opacity: 1;
        }
        /* Volume Bar */
        
        .vol-osd {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            z-index: 100;
            opacity: 0;
            transition: 0.2s;
        }
        
        .vol-osd.active {
            opacity: 1;
            right: 40px;
        }
        
        .vol-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            border-radius: 10px;
            transition: height 0.1s;
        }
        
        #mhrBoot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>

        let currentIndex = 0,
            currentVol = 50,
            hls = null,
            osdTimer, chTimer;
        let touchStartX = 0,
            touchEndX = 0;

        const video = document.getElementById('mhrPlayer');
        const blackout = document.getElementById('blackout');

        function launchMHR() {
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('mhrBoot').style.display = 'none';
            tune(0);
        }

        function tune(i) {
            currentIndex = i;
            blackout.style.opacity = "1";

            // Channel Display
            document.getElementById('chNumber').innerText = (currentIndex + 1).toString().padStart(2, '0');
            document.getElementById('chInfo').classList.add('show');
            clearTimeout(chTimer);
            chTimer = setTimeout(() => document.getElementById('chInfo').classList.remove('show'), 3000);

            if (hls) hls.destroy();
            video.classList.remove('active-view');

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(playlist[currentIndex]);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    video.classList.add('active-view');
                    blackout.style.opacity = "0";
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Support for Safari/iOS
                video.src = playlist[currentIndex];
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                    video.classList.add('active-view');
                    blackout.style.opacity = "0";
                });
            }
        }

        function setVolume(delta) {
            currentVol = Math.min(Math.max(currentVol + delta, 0), 100);
            video.volume = currentVol / 100;
            document.getElementById('volLevel').style.height = currentVol + "%";
            document.getElementById('volBar').classList.add('active');
            clearTimeout(osdTimer);
            osdTimer = setTimeout(() => document.getElementById('volBar').classList.remove('active'), 1500);
        }

        // SWIPE SYSTEM
        const touchZone = document.getElementById('touchZone');
        touchZone.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {
            passive: true
        });
        touchZone.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 70) {
                if (diff > 0) tune((currentIndex + 1) % playlist.length); // Swipe Left
                else tune((currentIndex - 1 + playlist.length) % playlist.length); // Swipe Right
            }
        }, {
            passive: true
        });

        // KEYBOARD SYSTEM
        document.addEventListener("keydown", (e) => {
            if (e.keyCode === 39) tune((currentIndex + 1) % playlist.length);
            if (e.keyCode === 37) tune((currentIndex - 1 + playlist.length) % playlist.length);
            if (e.keyCode === 38) {
                setVolume(5);
                e.preventDefault();
            }
            if (e.keyCode === 40) {
                setVolume(-5);
                e.preventDefault();
            }
        });
